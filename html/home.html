<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Home</title>
    <link rel="stylesheet" href="styles/home.css">
</head>
<body onload="checkLogin()">

    <div class="topbar">
        <div class="topbar-left"></div>

        <div class="topbar-center">
            Home
        </div>

        <div class="topbar-right">
            <div class="user-menu">

                <div class="user-button" onclick="toggleMenu()">
                    <div class="avatar" id="avatarCircle">U</div>
                    <span id="usernameDisplay">Loading...</span>
                    <span class="arrow">▼</span>
                </div>

                <div class="dropdown" id="userDropdown">
                    <div class="dropdown-item">
                        Username: <span id="dropdownUsername">Loading...</span>
                    </div>

                    <div class="dropdown-item">
                        Role: <span id="roleDisplay">...</span>
                    </div>

                    <div class="dropdown-item logout" onclick="logout()">
                        Logout
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="main">

        <div class="chatbox">
            <h2>Chatbox</h2>

            <div id="chatMessages" class="chat-messages"></div>

            <div class="chat-input">
                <input
                    id="chatInput"
                    type="text"
                    placeholder="Write message..."
                    onkeydown="handleChatEnter(event)"
                >
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="scripts/validation.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/chat.js"></script>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("userDropdown")
            menu.classList.toggle("show")
        }

        window.onclick = function(event) {
            if (!event.target.closest(".user-menu")) {
                const menu = document.getElementById("userDropdown")
                if (menu) {
                    menu.classList.remove("show")
                }
            }
        }
    </script>
</body>
</html>
