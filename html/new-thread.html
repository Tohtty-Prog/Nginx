<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Thread</title>
    <link rel="stylesheet" href="/styles/new-thread.css">
</head>
<body onload="initNewThreadPage()">

    <div class="topbar">
        <div class="topbar-left">
            <div class="brand">Chat App</div>
        </div>

        <div class="topbar-center">
            Threads
        </div>

        <div class="topbar-right">
            <button id="adminPanelButton" class="admin-btn hidden" onclick="goToAdminPanel()">
                Admin Panel
            </button>
            <button class="back-btn" onclick="goHome()">
                Back to Home
            </button>

            <div class="user-menu">
                <div class="user-button" onclick="toggleMenu()">
                    <div class="avatar" id="avatarCircle">U</div>
                    <span id="usernameDisplay">Loading...</span>
                    <span class="arrow">▼</span>
                </div>

                <div class="dropdown" id="userDropdown">
                    <div class="dropdown-item">
                        Username: <span id="dropdownUsername">Loading...</span>
                    </div>

                    <div class="dropdown-item">
                        Role: <span id="roleDisplay">...</span>
                    </div>

                    <div class="dropdown-item profile-link" onclick="goToProfile()">Profile</div>

                    <div class="dropdown-item logout" onclick="logout()">
                        Logout
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="thread-form-card">
            <h1>Create New Thread</h1>
            <p class="subtitle">Start a new discussion for the forum.</p>

            <div class="form-group">
                <label for="threadTitle">Title</label>
                <input id="threadTitle" type="text" placeholder="Thread title">
            </div>

            <div class="form-group">
                <label for="threadContent">Content</label>
                <textarea id="threadContent" placeholder="Write your thread content..."></textarea>
            </div>

            <div id="threadResult" class="result"></div>

            <div class="form-actions">
                <button onclick="goHome()" class="secondary-btn">Cancel</button>
                <button onclick="createThread()">Post Thread</button>
            </div>
        </div>
    </div>
    <script src="/scripts/validation.js"></script>
    <script src="/scripts/auth.js"></script>
    <script src="/scripts/new-thread.js"></script>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("userDropdown")
            menu.classList.toggle("show")
        }

        window.onclick = function(event) {
            if (!event.target.closest(".user-menu")) {
                const menu = document.getElementById("userDropdown")
                if (menu) {
                    menu.classList.remove("show")
                }
            }
        }

        function goToProfile() {
            window.location.href = "/profile.html"
        }

        function goToAdminPanel() {
            window.location.href = "/admin.html"
        }

        function showAdminButton(role) {
            const button = document.getElementById("adminPanelButton")

            if (!button) return

            if ((role || "").toLowerCase() === "admin") {
                button.classList.remove("hidden")
            } else {
                button.classList.add("hidden")
            }
        }
    </script>
</body>
</html>
